<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>World Cup Pool Bracket</title>
<style>
  :root{
    --bg:#f7f3ea;
    --paper:#fffdf8;
    --ink:#202020;
    --muted:#77716a;
    --line:#d8ccba;
    --gold:#b99045;
    --green:#1f4f3a;
    --dead:#b9b1a6;
    --live:#b3352f;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header{position:sticky;top:0;z-index:10;background:rgba(247,243,234,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:14px 18px}
  .top{display:flex;align-items:end;justify-content:space-between;gap:16px;max-width:1600px;margin:auto}
  h1{font-size:22px;line-height:1;margin:0;letter-spacing:.04em;text-transform:uppercase}
  .sub{font-size:12px;color:var(--muted);margin-top:5px}.updated{font-size:12px;color:var(--muted);white-space:nowrap}
  .standings{max-width:1600px;margin:10px auto 0;display:flex;gap:8px;overflow:auto;padding-bottom:2px}
  .person{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:13px;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .person strong{font-weight:800}.alive{color:var(--green);font-weight:800}
  main{padding:18px;overflow:auto}.bracket{min-width:1450px;display:grid;grid-template-columns:repeat(5, 260px);gap:34px;align-items:start;max-width:1600px;margin:auto}.round h2{font-size:12px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin:0 0 14px;border-bottom:1px solid var(--line);padding-bottom:8px}
  .match{position:relative;background:var(--paper);border:1px solid var(--line);border-radius:12px;margin-bottom:18px;box-shadow:0 3px 10px rgba(36,26,10,.06);overflow:visible}.match::after{content:"";position:absolute;right:-18px;top:50%;width:18px;border-top:2px solid var(--line)}.round:last-child .match::after{display:none}.slot{display:grid;grid-template-columns:1fr auto;gap:10px;padding:10px 11px;border-bottom:1px solid #eee5d8;min-height:52px}.slot:last-child{border-bottom:0}.team{font-weight:800;font-size:14px;line-height:1.1}.owner{font-size:11px;color:var(--muted);margin-top:4px}.score{font-size:18px;font-weight:900;align-self:center;min-width:24px;text-align:right}.winner{border-left:4px solid var(--gold);background:#fff9ea}.loser{opacity:.45}.tbd{color:#9a9288}.status{border-top:1px solid #eee5d8;background:#fbf7ee;color:var(--muted);font-size:11px;padding:6px 10px;display:flex;justify-content:space-between;gap:8px}.live .status{color:var(--live);font-weight:800}.live{box-shadow:0 0 0 2px rgba(179,53,47,.12)}
  .spacer-1{margin-top:35px}.spacer-2{margin-top:86px}.spacer-3{margin-top:188px}.spacer-4{margin-top:392px}.note{max-width:1600px;margin:12px auto 0;color:var(--muted);font-size:12px}
  @media(max-width:800px){header{padding:12px}.top{display:block}h1{font-size:18px}.updated{margin-top:6px}.bracket{min-width:1320px;grid-template-columns:repeat(5,240px);gap:24px}main{padding:12px}.match::after{right:-13px;width:13px}.slot{padding:9px}.team{font-size:13px}}
</style>
</head>
<body>
<header>
  <div class="top"><div><h1>World Cup Pool Bracket</h1><div class="sub">Clean bracket view with owner names and current results</div></div><div class="updated" id="updated">Updated now</div></div>
  <div class="standings" id="standings"></div>
</header>
<main>
  <div class="bracket" id="bracket"></div>
  <div class="note">Scroll horizontally on mobile. Results are embedded from the current bracket; update the match scores/winners in the script or connect the same structure to an API feed later.</div>
</main>
<script>
const owners={
  "Mexico":"Tyler","Morocco":"Tyler","Congo DR":"Tyler",
  "Switzerland":"Ricky","Cape Verde":"Ricky",
  "Brazil":"Ryan","Canada":"Ryan",
  "USA":"Emmett","Norway":"Emmett","Bosnia and Herzegovina":"Emmett",
  "Germany":"Zach","Australia":"Zach",
  "Netherlands":"Forrest","South Africa":"Forrest","Sweden":"Forrest",
  "Belgium":"Dillon","Austria":"Dillon","Ecuador":"Dillon",
  "Spain":"Mike","Croatia":"Mike","Senegal":"Mike",
  "France":"Wade","Ivory Coast":"Wade",
  "Argentina":"Nolan","Portugal":"Nolan","Ghana":"Nolan",
  "Colombia":"Justine","Japan":"Justine","Paraguay":"Justine",
  "England":"Kevin","Egypt":"Kevin","Algeria":"Kevin"
};
const flags={"Mexico":"🇲🇽","Morocco":"🇲🇦","Congo DR":"🇨🇩","Switzerland":"🇨🇭","Cape Verde":"🇨🇻","Brazil":"🇧🇷","Canada":"🇨🇦","USA":"🇺🇸","Norway":"🇳🇴","Bosnia and Herzegovina":"🇧🇦","Germany":"🇩🇪","Australia":"🇦🇺","Netherlands":"🇳🇱","South Africa":"🇿🇦","Sweden":"🇸🇪","Belgium":"🇧🇪","Austria":"🇦🇹","Ecuador":"🇪🇨","Spain":"🇪🇸","Croatia":"🇭🇷","Senegal":"🇸🇳","France":"🇫🇷","Ivory Coast":"🇨🇮","Argentina":"🇦🇷","Portugal":"🇵🇹","Ghana":"🇬🇭","Colombia":"🇨🇴","Japan":"🇯🇵","Paraguay":"🇵🇾","England":"🏴","Egypt":"🇪🇬","Algeria":"🇩🇿"};
const rounds=[
 {id:'r32',title:'Round of 32',spacer:''},
 {id:'r16',title:'Round of 16',spacer:'spacer-1'},
 {id:'qf',title:'Quarterfinals',spacer:'spacer-2'},
 {id:'sf',title:'Semifinals',spacer:'spacer-3'},
 {id:'f',title:'Final',spacer:'spacer-4'}
];
const matches={
  m73:{round:'r32',teams:['South Africa','Canada'],scores:[0,1],winner:'Canada',status:'Final'},
  m74:{round:'r32',teams:['Germany','Paraguay'],scores:[1,1],winner:'Paraguay',status:'Final · Paraguay on pens'},
  m75:{round:'r32',teams:['Netherlands','Morocco'],scores:[1,1],winner:'Morocco',status:'Final · Morocco on pens'},
  m76:{round:'r32',teams:['Brazil','Japan'],scores:[2,1],winner:'Brazil',status:'Final'},
  m77:{round:'r32',teams:['France','Sweden'],scores:[3,0],winner:'France',status:'Final'},
  m78:{round:'r32',teams:['Ivory Coast','Norway'],scores:[1,2],winner:'Norway',status:'Final'},
  m79:{round:'r32',teams:['Mexico','Ecuador'],scores:[2,0],winner:'Mexico',status:'Final'},
  m80:{round:'r32',teams:['England','Congo DR'],scores:[2,1],winner:'England',status:'Final'},
  m83:{round:'r32',teams:['Portugal','Croatia'],scores:[null,null],winner:null,status:'Scheduled'},
  m84:{round:'r32',teams:['Spain','Austria'],scores:[3,0],winner:'Spain',status:'Final'},
  m81:{round:'r32',teams:['USA','Bosnia and Herzegovina'],scores:[2,0],winner:'USA',status:'Final'},
  m82:{round:'r32',teams:['Belgium','Senegal'],scores:[3,2],winner:'Belgium',status:'Final'},
  m86:{round:'r32',teams:['Argentina','Cape Verde'],scores:[null,null],winner:null,status:'Scheduled'},
  m88:{round:'r32',teams:['Australia','Egypt'],scores:[null,null],winner:null,status:'Scheduled'},
  m85:{round:'r32',teams:['Switzerland','Algeria'],scores:[null,null],winner:null,status:'Scheduled'},
  m87:{round:'r32',teams:['Colombia','Ghana'],scores:[null,null],winner:null,status:'Scheduled'},
  m89:{round:'r16',from:['m74','m77'],teams:[],scores:[null,null],winner:null,status:'Jul 4'},
  m90:{round:'r16',from:['m73','m75'],teams:[],scores:[null,null],winner:null,status:'Jul 4'},
  m91:{round:'r16',from:['m76','m78'],teams:[],scores:[null,null],winner:null,status:'Jul 5'},
  m92:{round:'r16',from:['m79','m80'],teams:[],scores:[null,null],winner:null,status:'Jul 5'},
  m93:{round:'r16',from:['m83','m84'],teams:[],scores:[null,null],winner:null,status:'Jul 6'},
  m94:{round:'r16',from:['m81','m82'],teams:[],scores:[null,null],winner:null,status:'Jul 6'},
  m95:{round:'r16',from:['m86','m88'],teams:[],scores:[null,null],winner:null,status:'Jul 7'},
  m96:{round:'r16',from:['m85','m87'],teams:[],scores:[null,null],winner:null,status:'Jul 7'},
  m97:{round:'qf',from:['m89','m90'],teams:[],scores:[null,null],winner:null,status:'Jul 9'},
  m98:{round:'qf',from:['m93','m94'],teams:[],scores:[null,null],winner:null,status:'Jul 10'},
  m99:{round:'qf',from:['m91','m92'],teams:[],scores:[null,null],winner:null,status:'Jul 11'},
  m100:{round:'qf',from:['m95','m96'],teams:[],scores:[null,null],winner:null,status:'Jul 11'},
  m101:{round:'sf',from:['m97','m98'],teams:[],scores:[null,null],winner:null,status:'Jul 14'},
  m102:{round:'sf',from:['m99','m100'],teams:[],scores:[null,null],winner:null,status:'Jul 15'},
  m104:{round:'f',from:['m101','m102'],teams:[],scores:[null,null],winner:null,status:'Jul 19'}
};
const order=['m73','m74','m75','m76','m77','m78','m79','m80','m83','m84','m81','m82','m86','m88','m85','m87','m89','m90','m91','m92','m93','m94','m95','m96','m97','m98','m99','m100','m101','m102','m104'];
function compute(){
  let changed=true, guard=0;
  while(changed && guard++<10){changed=false; for(const id of order){const m=matches[id]; if(m.from){const teams=m.from.map(fid=>matches[fid].winner || null); if(JSON.stringify(teams)!==JSON.stringify(m.teams)){m.teams=teams; changed=true;}}}}
}
function teamRow(team,score,winner){
  const name=team||'TBD'; const own=owners[name]||''; const win=winner&&team===winner; const lose=winner&&team&&team!==winner;
  return `<div class="slot ${win?'winner':''} ${lose?'loser':''} ${!team?'tbd':''}"><div><div class="team">${team?`${flags[name]||''} ${name}`:'TBD'}</div><div class="owner">${own||'Awaiting winner'}</div></div><div class="score">${score??''}</div></div>`;
}
function render(){
  compute();
  const root=document.getElementById('bracket'); root.innerHTML='';
  for(const r of rounds){
    const col=document.createElement('section'); col.className='round'; col.innerHTML=`<h2>${r.title}</h2>`;
    const ids=order.filter(id=>matches[id].round===r.id);
    ids.forEach((id,i)=>{const m=matches[id]; const div=document.createElement('div'); div.className=`match ${m.status==='Live'?'live':''} ${r.spacer&&i===0?r.spacer:''}`; div.innerHTML=teamRow(m.teams[0],m.scores[0],m.winner)+teamRow(m.teams[1],m.scores[1],m.winner)+`<div class="status"><span>${m.status}</span><span>${id.toUpperCase()}</span></div>`; col.appendChild(div);});
    root.appendChild(col);
  }
  renderStandings();
  document.getElementById('updated').textContent='Last updated: '+new Date().toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}
function renderStandings(){
  const allOwners=[...new Set(Object.values(owners))];
  const teamState={}; Object.keys(owners).forEach(t=>teamState[t]='alive');
  for(const id of Object.keys(matches)){const m=matches[id]; if(m.winner){m.teams.forEach(t=>{if(t&&t!==m.winner) teamState[t]='out';});}}
  const rows=allOwners.map(name=>{const teams=Object.entries(owners).filter(([t,o])=>o===name).map(([t])=>t); const alive=teams.filter(t=>teamState[t]==='alive').length; return {name,teams,alive};}).sort((a,b)=>b.alive-a.alive || a.name.localeCompare(b.name));
  document.getElementById('standings').innerHTML=rows.map(r=>`<div class="person"><strong>${r.name}</strong><span class="alive">${r.alive}</span><span>${r.teams.map(t=>teamState[t]==='alive'?(flags[t]||''):'×').join(' ')}</span></div>`).join('');
}
render();
setInterval(render,60000);
</script>
</body>
</html>
